# Recipe: Phase 7 Final — Qwen2.5-Coder-7B-Instruct QLoRA
# Model: Qwen/Qwen2.5-Coder-7B-Instruct
# Dataset: data/thinkanywhere_sft_v7.jsonl
# Purpose: Fine-tune 7B with QLoRA 4-bit on Colab T4 with thinkanywhere tokens.

model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"
dataset_path: "data/thinkanywhere_sft_v7.jsonl"
output_dir: "results/sft_phase7_final_qwen25_7b"

# LoRA Parameters
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# Training Parameters
learning_rate: 0.0001
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
max_steps: -1
max_seq_length: 1024
epochs: 3

# BitsAndBytes QLoRA 4-bit
load_in_4bit: true
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"
bnb_4bit_use_double_quant: true

# Hardware
device: "auto"

# Special tokens (added in training slice)
additional_special_tokens: ["<thinkanywhere>", "</thinkanywhere>"]
